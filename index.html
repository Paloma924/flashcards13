<!DOCTYPE html>
<html lang="es">
<head> 
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Chino</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f5a623;
            --background: #f0f2f5;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .counter { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .card-container {
            width: 340px;
            height: 220px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--card-bg);
            border: 3px solid var(--primary);
        }
        .card-back {
            border-color: var(--secondary);
            transform: rotateY(180deg);
        }
        .hanzi { font-size: 56px; font-weight: bold; margin: 0; }
        .pinyin { font-size: 24px; color: var(--primary); margin-bottom: 10px; font-weight: bold; }
        .meaning { font-size: 24px; font-weight: bold; }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .controls { display: flex; gap: 15px; width: 340px; margin-top: 10px; }

        #micResult {
            width: 340px;
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            display: none;
            transition: all 0.3s ease;
        }
        #micResult.perfect {
            background-color: #d4edda;
            color: #1a6b2f;
            border: 2px solid #28a745;
            font-size: 17px;
        }
        #micResult.good {
            background-color: #fff3cd;
            color: #7d5a00;
            border: 2px solid #f0a500;
        }
        #micResult.incorrect {
            background-color: #fde8e8;
            color: #8b1a1a;
            border: 2px solid #e74c3c;
        }
        #micResult.listening {
            background-color: #eef3ff;
            color: #3a4a9f;
            border: 2px solid #7289da;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
            70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
            100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
        }
        .btn.listening {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>

    <h1>¿Qué comemos?</h1>
    <div class="counter" id="counter">Tarjeta 1 de 26</div>

    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <div class="card-face">
                <p class="hanzi" id="displayHanzi">面</p>
            </div>
            <div class="card-face card-back">
                <div class="pinyin" id="displayPinyin">Miàn</div>
                <div class="meaning" id="displayMeaning">Tallarines</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" style="background-color: #2c3e50;" id="listenBtn">🔊 Escuchar</button>
        <button class="btn" style="background-color: #e74c3c;" id="micBtn">🎙️ Hablar</button>
    </div>

    <div id="micResult"></div>

    <div class="controls">
        <button class="btn" style="background-color: #7f8c8d;" id="prevBtn">Anterior</button>
        <button class="btn" id="nextBtn">Siguiente</button>
    </div>

    <script>
        var vocabulary = [
            { h: "面", p: "Miàn", m: "Tallarines" },
            { h: "炒面", p: "Chǎo miàn", m: "Tallarines fritos" },
            { h: "面包", p: "Miàn bāo", m: "Pan" },
            { h: "米饭", p: "Mǐ fàn", m: "Arroz" },
            { h: "白饭", p: "Bái fàn", m: "Arroz blanco" },
            { h: "炒饭", p: "Chǎo fàn", m: "Arroz frito" },
            { h: "汉堡", p: "Hàn bǎo", m: "Hamburguesa" },
            { h: "蔬菜", p: "Shū cài", m: "Verdura" },
            { h: "鱼", p: "Yú", m: "Pescado" },
            { h: "鸡蛋", p: "Jī dàn", m: "Huevo" },
            { h: "沙拉", p: "Shā là", m: "Ensalada" },
            { h: "肉", p: "Ròu", m: "Carne" },
            { h: "鸡肉", p: "Jī ròu", m: "Pollo" },
            { h: "牛肉", p: "Niú ròu", m: "Ternera" },
            { h: "猪肉", p: "Zhū ròu", m: "Cerdo" },
            { h: "羊肉", p: "Yáng ròu", m: "Cordero" },
            { h: "水果", p: "Shuǐ guǒ", m: "Fruta" },
            { h: "香蕉", p: "Xiāng jiāo", m: "Plátano" },
            { h: "苹果", p: "Píng guǒ", m: "Manzana" },
            { h: "西瓜", p: "Xī guā", m: "Sandía" },
            { h: "橙子", p: "Chéng zi", m: "Naranja" },
            { h: "葡萄", p: "Pú táo", m: "Uvas" },
            { h: "甜点", p: "Tián diàn", m: "Postre" },
            { h: "冰淇淋", p: "Bīng qí lín", m: "Helado" },
            { h: "巧克力", p: "Qiǎo kè lì", m: "Chocolate" },
            { h: "蛋糕", p: "Dàn gāo", m: "Tarta, pastel" }
        ];

        var index = 0;
        var card = document.getElementById('card');
        var micBtn = document.getElementById('micBtn');
        var micResult = document.getElementById('micResult');
        var isListening = false;

        var Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        var rec = Speech ? new Speech() : null;
        if (rec) {
            rec.lang = 'zh-CN';
            rec.interimResults = false;
            rec.maxAlternatives = 5;
        }

        // Solicitar permiso del micrófono al cargar la página
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    stream.getTracks().forEach(function(t) { t.stop(); });
                })
                .catch(function() {});
        }

        function render() {
            card.classList.remove('flipped');
            var item = vocabulary[index];
            document.getElementById('displayHanzi').innerText = item.h;
            document.getElementById('displayPinyin').innerText = item.p;
            document.getElementById('displayMeaning').innerText = item.m;
            document.getElementById('counter').innerText = "Tarjeta " + (index + 1) + " de " + vocabulary.length;
            hideMicResult();
        }

        function showMicResult(type, msg) {
            micResult.className = type;
            micResult.innerText = msg;
            micResult.style.display = 'block';
        }

        function hideMicResult() {
            micResult.style.display = 'none';
            micResult.className = '';
        }

        function setListening(on) {
            isListening = on;
            if (on) {
                micBtn.textContent = '🔴 Escuchando...';
                micBtn.classList.add('listening');
                showMicResult('listening', '🎙️ Di la palabra en chino...');
            } else {
                micBtn.textContent = '🎙️ Hablar';
                micBtn.classList.remove('listening');
            }
        }

        document.getElementById('cardContainer').addEventListener('click', function() {
            card.classList.toggle('flipped');
        });

        document.getElementById('nextBtn').addEventListener('click', function() {
            if (index < vocabulary.length - 1) { index++; } else { index = 0; }
            render();
        });

        document.getElementById('prevBtn').addEventListener('click', function() {
            if (index > 0) { index--; } else { index = vocabulary.length - 1; }
            render();
        });

        document.getElementById('listenBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            window.speechSynthesis.cancel();
            var u = new SpeechSynthesisUtterance(vocabulary[index].h);
            u.lang = 'zh-CN';
            window.speechSynthesis.speak(u);
        });

        micBtn.addEventListener('click', function(e) {
            e.stopPropagation();

            if (!rec) {
                showMicResult('incorrect', '❌ Tu navegador no soporta reconocimiento de voz. Usa Google Chrome.');
                return;
            }

            if (isListening) {
                rec.stop();
                return;
            }

            setListening(true);

            try {
                rec.start();
            } catch(err) {
                setListening(false);
                showMicResult('incorrect', '❌ Error al iniciar el micrófono. Inténtalo de nuevo.');
            }

            rec.onresult = function(event) {
                setListening(false);
                var expected = vocabulary[index].h.trim();

                // Buscar la mejor alternativa que coincida con el esperado
                var bestMatch = null;
                var bestConfidence = 0;

                for (var i = 0; i < event.results[0].length; i++) {
                    var alt = event.results[0][i];
                    var transcript = alt.transcript.trim();
                    var confidence = alt.confidence;

                    if (transcript === expected && confidence > bestConfidence) {
                        bestMatch = alt;
                        bestConfidence = confidence;
                    }
                }

                var topTranscript = event.results[0][0].transcript.trim();

                if (bestMatch) {
                    // Coincide — distinguir Perfecto vs Bien por confianza
                    if (bestConfidence >= 0.8) {
                        showMicResult('perfect', '🌟 ¡Perfecto! (' + Math.round(bestConfidence * 100) + '%)');
                        card.classList.add('flipped');
                    } else {
                        showMicResult('good', '👍 ¡Bien! Pronunciación aceptable (' + Math.round(bestConfidence * 100) + '%) — sigue practicando');
                        card.classList.add('flipped');
                    }
                } else {
                    // No coincide
                    showMicResult('incorrect', '❌ Se entendió: "' + topTranscript + '"  |  Esperado: ' + expected);
                }
            };

            rec.onerror = function(event) {
                setListening(false);
                if (event.error === 'no-speech') {
                    showMicResult('incorrect', '🔇 No se detectó ninguna voz. Inténtalo de nuevo.');
                } else if (event.error === 'not-allowed') {
                    showMicResult('incorrect', '🚫 Permiso de micrófono denegado. Actívalo en el navegador.');
                } else {
                    showMicResult('incorrect', '❌ Error al escuchar. Inténtalo de nuevo.');
                }
            };

            rec.onend = function() {
                if (isListening) setListening(false);
            };
        });

        render();
    </script>
</body>
</html>
