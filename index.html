<!DOCTYPE html>
<html lang="es">
<head> 
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards de Chino</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f5a623;
            --background: #f0f2f5;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .counter { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .card-container {
            width: 340px;
            height: 220px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            background-color: var(--card-bg);
            border: 3px solid var(--primary);
        }
        .card-back {
            border-color: var(--secondary);
            transform: rotateY(180deg);
        }
        .hanzi { font-size: 56px; font-weight: bold; margin: 0; }
        .pinyin { font-size: 24px; color: var(--primary); margin-bottom: 10px; font-weight: bold; }
        .meaning { font-size: 24px; font-weight: bold; }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .controls { display: flex; gap: 15px; width: 340px; margin-top: 10px; }

        #micResult {
            width: 340px;
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            display: none;
            transition: all 0.3s ease;
        }
        #micResult.perfect {
            background-color: #d4edda;
            color: #1a6b2f;
            border: 2px solid #28a745;
            font-size: 17px;
        }
        #micResult.good {
            background-color: #fff3cd;
            color: #7d5a00;
            border: 2px solid #f0a500;
        }
        #micResult.incorrect {
            background-color: #fde8e8;
            color: #8b1a1a;
            border: 2px solid #e74c3c;
        }
        #micResult.listening {
            background-color: #eef3ff;
            color: #3a4a9f;
            border: 2px solid #7289da;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
            70%  { box-shadow: 0 0 0 10px rgba(231,76,60,0); }
            100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
        }
        .btn.listening {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>

    <h1>¿Qué comemos?</h1>
    <div class="counter" id="counter">Tarjeta 1 de 26</div>

    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <div class="card-face">
                <p class="hanzi" id="displayHanzi">面</p>
            </div>
            <div class="card-face card-back">
                <div class="pinyin" id="displayPinyin">Miàn</div>
                <div class="meaning" id="displayMeaning">Tallarines</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" style="background-color: #2c3e50;" id="listenBtn">🔊 Escuchar</button>
        <button class="btn" style="background-color: #e74c3c;" id="micBtn">🎙️ Hablar</button>
    </div>

    <div id="micResult"></div>

    <div class="controls">
        <button class="btn" style="background-color: #7f8c8d;" id="prevBtn">Anterior</button>
        <button class="btn" id="nextBtn">Siguiente</button>
    </div>
